when:
  - event: manual
  - event: pull_request
    evaluate: 'CI_COMMIT_TARGET_BRANCH == "main"'

matrix:
  include:
    - MAGENTO_VERSION: "2.4.6-p8"
      PHP_VERSION: "8.1"
      COMPOSER_CHANNEL: "2.2"
    - MAGENTO_VERSION: "2.4.7-p3"
      PHP_VERSION: "8.2"
      COMPOSER_CHANNEL: "2"
    - MAGENTO_VERSION: "2.4.8"
      PHP_VERSION: "8.3"
      COMPOSER_CHANNEL: "2"

steps:
  test:
    image: ghcr.io/shivammathur/php:${PHP_VERSION}
    environment:
      COMPOSER_AUTH:
        from_secret: composer_auth
      COMPOSER_MEMORY_LIMIT: "-1"
    commands:
      - php -v
      - php -r "ini_set('memory_limit','768M'); echo ini_get('memory_limit'), PHP_EOL;"
      - composer --version || true
      - |
        if ! command -v composer >/dev/null 2>&1; then
          php -r "copy('https://getcomposer.org/installer','composer-setup.php');"
          php composer-setup.php --quiet --install-dir=/usr/local/bin --filename=composer
          rm -f composer-setup.php
        fi
      - composer self-update --${COMPOSER_CHANNEL} || true
      - composer config --global audit.block-insecure false || true
      - |
        if [ -n "${COMPOSER_AUTH:-}" ]; then
          mkdir -p ~/.composer
          printf '%s' "$COMPOSER_AUTH" > ~/.composer/auth.json
        else
          echo "Missing Composer auth for repo.magento.com. Provide composer_auth secret."
          exit 1
        fi
      - composer create-project --repository-url=https://repo.magento.com/ magento/project-community-edition:${MAGENTO_VERSION} magento --no-interaction
      - cd magento
      - composer config repositories.logviewer path ..
      - composer require rjds/magento2-module-log-viewer:@dev --no-interaction
      - cp dev/tests/integration/etc/install-config-mysql.php.dist dev/tests/integration/etc/install-config-mysql.php
      - sed -i "s/'db-host' => 'localhost'/'db-host' => 'mysql'/" dev/tests/integration/etc/install-config-mysql.php
      - sed -i "s/'db-password' => '123123q'/'db-password' => 'magento'/" dev/tests/integration/etc/install-config-mysql.php
      - sed -i "s/'opensearch-host' => 'localhost'/'opensearch-host' => 'opensearch'/" dev/tests/integration/etc/install-config-mysql.php
      - sed -i "s/'amqp-host' => 'localhost'/'amqp-host' => 'rabbitmq'/" dev/tests/integration/etc/install-config-mysql.php
      - cd dev/tests/integration
      - |
        test_root="../../../vendor/rjds/magento2-module-log-viewer/Test/Integration"
        if ! find "$test_root" -type f -name '*Test.php' | grep -q .; then
          echo "No *Test.php files found under $test_root"
          exit 1
        fi
        find "$test_root" -type f -name '*Test.php' -print0 | sort -z | xargs -0 ../../../vendor/bin/phpunit -c phpunit.xml.dist

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: magento
      MYSQL_DATABASE: magento_integration_tests
  opensearch:
    image: opensearchproject/opensearch:2.11.1
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
  rabbitmq:
    image: rabbitmq:3.13-management-alpine

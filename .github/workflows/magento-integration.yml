name: Magento integration tests

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - magento-version: "2.4.6-p8"
            php-version: "8.1"
            composer-version: "2.2.24"
          - magento-version: "2.4.7-p3"
            php-version: "8.2"
            composer-version: "2.7"
          - magento-version: "2.4.8"
            php-version: "8.3"
            composer-version: "2.7"

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: magento
          MYSQL_DATABASE: magento_integration_tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -pmagento"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      elasticsearch:
        image: docker.io/elastic/elasticsearch:7.17.24
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: -Xms256m -Xmx256m
        ports:
          - 9200:9200
        options: >-
          --health-cmd="curl -fsS http://127.0.0.1:9200/_cluster/health"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        env:
          RABBITMQ_VM_MEMORY_HIGH_WATERMARK: "0.4"
        ports:
          - 5672:5672
        options: >-
          --health-cmd="rabbitmq-diagnostics -q ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout module
        uses: actions/checkout@v4
        with:
          path: extension

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: bcmath, ctype, curl, dom, gd, intl, mbstring, openssl, pdo_mysql, simplexml, soap, sockets, sodium, xml, xsl, zip
          coverage: none
          ini-values: memory_limit=768M
          tools: composer:${{ matrix.composer-version }}

      - name: Configure Composer for CI
        run: composer config --global audit.block-insecure false || true

      - name: Configure Composer authentication for repo.magento.com
        env:
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
          MAGENTO_PUBLIC_KEY: ${{ secrets.MAGENTO_PUBLIC_KEY }}
          MAGENTO_PRIVATE_KEY: ${{ secrets.MAGENTO_PRIVATE_KEY }}
        run: |
          if [ -n "${COMPOSER_AUTH:-}" ]; then
            mkdir -p ~/.composer
            printf '%s' "$COMPOSER_AUTH" > ~/.composer/auth.json
          elif [ -n "${MAGENTO_PUBLIC_KEY:-}" ] && [ -n "${MAGENTO_PRIVATE_KEY:-}" ]; then
            composer config --global http-basic.repo.magento.com "$MAGENTO_PUBLIC_KEY" "$MAGENTO_PRIVATE_KEY"
          else
            echo "Set COMPOSER_AUTH or MAGENTO_PUBLIC_KEY and MAGENTO_PRIVATE_KEY."
            exit 1
          fi

      - name: Create Magento project
        env:
          COMPOSER_MEMORY_LIMIT: "1536M"
        run: |
          composer create-project \
            --repository-url=https://repo.magento.com/ \
            magento/project-community-edition:${{ matrix.magento-version }} \
            magento \
            --no-interaction

      - name: Require module from checkout
        working-directory: magento
        env:
          COMPOSER_MEMORY_LIMIT: "1536M"
        run: |
          composer config repositories.logviewer path ../extension
          composer require rjds/magento2-module-log-viewer:@dev --no-interaction

      - name: Configure integration test install-config
        working-directory: magento
        run: |
          cp dev/tests/integration/etc/install-config-mysql.php.dist dev/tests/integration/etc/install-config-mysql.php
          sed -i "s/'db-host' => 'localhost'/'db-host' => '127.0.0.1'/" dev/tests/integration/etc/install-config-mysql.php
          sed -i "s/'db-password' => '123123q'/'db-password' => 'magento'/" dev/tests/integration/etc/install-config-mysql.php
          sed -i "s/'search-engine' => 'opensearch'/'search-engine' => 'elasticsearch7'/" dev/tests/integration/etc/install-config-mysql.php
          sed -i "s/'opensearch-host' => 'localhost'/'elasticsearch-host' => '127.0.0.1'/" dev/tests/integration/etc/install-config-mysql.php
          sed -i "s/'opensearch-port' => 9200/'elasticsearch-port' => 9200/" dev/tests/integration/etc/install-config-mysql.php
          sed -i "s/'amqp-host' => 'localhost'/'amqp-host' => '127.0.0.1'/" dev/tests/integration/etc/install-config-mysql.php

      - name: Run Log Viewer integration tests
        working-directory: magento/dev/tests/integration
        run: |
          test_root="../../../vendor/rjds/magento2-module-log-viewer/Test/Integration"
          if ! find "$test_root" -type f -name '*Test.php' | grep -q .; then
            echo "No *Test.php files found under $test_root"
            exit 1
          fi
          find "$test_root" -type f -name '*Test.php' -print0 | sort -z | xargs -0 ../../../vendor/bin/phpunit -c phpunit.xml.dist
